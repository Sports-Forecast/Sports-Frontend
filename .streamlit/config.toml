[theme]
primaryColor = "#0078D4"
backgroundColor = "#1E1E1E"
secondaryBackgroundColor = "#252526"
textColor = "#FFFFFF"
font = "sans serif"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
magicEnabled = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"
messageFormat = "%(asctime)s %(message)s"
